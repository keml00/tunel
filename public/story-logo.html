<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Buy & Sell - Story Logo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .story-container {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background circles */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
        }

        .circle-1 {
            width: 600px;
            height: 600px;
            background: white;
            top: -200px;
            left: -200px;
            animation: float 6s ease-in-out infinite;
        }

        .circle-2 {
            width: 800px;
            height: 800px;
            background: white;
            bottom: -300px;
            right: -300px;
            animation: float 8s ease-in-out infinite reverse;
        }

        .circle-3 {
            width: 400px;
            height: 400px;
            background: white;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(30px); }
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px;
        }

        /* Logo icon */
        .logo-icon {
            width: 280px;
            height: 280px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 60px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.3);
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .logo-icon svg {
            width: 160px;
            height: 160px;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2));
        }

        /* Text */
        .brand-name {
            font-size: 96px;
            font-weight: 900;
            color: white;
            margin-bottom: 30px;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            letter-spacing: -2px;
        }

        .tagline {
            font-size: 52px;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 80px;
            font-weight: 600;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Features */
        .features {
            display: flex;
            flex-direction: column;
            gap: 40px;
            margin-bottom: 80px;
        }

        .feature {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            font-size: 48px;
            color: white;
            font-weight: 600;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .feature-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
        }

        /* Pricing */
        .pricing {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 50px 80px;
            margin-bottom: 60px;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .price {
            font-size: 120px;
            font-weight: 900;
            color: white;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .price-label {
            font-size: 44px;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 10px;
        }

        /* CTA */
        .cta {
            background: white;
            color: #667eea;
            font-size: 56px;
            font-weight: 800;
            padding: 40px 100px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 60px;
        }

        /* URL */
        .url {
            font-size: 48px;
            color: white;
            font-weight: 700;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Telegram */
        .telegram {
            margin-top: 40px;
            font-size: 44px;
            color: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="story-container">
        <!-- Background circles -->
        <div class="bg-circle circle-1"></div>
        <div class="bg-circle circle-2"></div>
        <div class="bg-circle circle-3"></div>

        <!-- Content -->
        <div class="content">
            <!-- Logo -->
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>

            <!-- Brand name -->
            <div class="brand-name">VPN Buy & Sell</div>
            <div class="tagline">Безопасный VPN</div>

            <!-- Features -->
            <div class="features">
                <div class="feature">
                    <div class="feature-icon">🔒</div>
                    <span>Надежная защита</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">⚡</div>
                    <span>Высокая скорость</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">📱</div>
                    <span>До 5 устройств</span>
                </div>
            </div>

            <!-- Pricing -->
            <div class="pricing">
                <div class="price">от 200₽</div>
                <div class="price-label">в месяц</div>
            </div>

            <!-- CTA -->
            <div class="cta">Подключить сейчас</div>

            <!-- URL -->
            <div class="url">tunel-delta.vercel.app</div>

            <!-- Telegram -->
            <div class="telegram">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="white">
                    <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.295-.6.295-.002 0-.003 0-.005 0l.213-3.054 5.56-5.022c.24-.213-.054-.334-.373-.121l-6.869 4.326-2.96-.924c-.64-.203-.658-.64.135-.954l11.566-4.458c.538-.196 1.006.128.832.941z"/>
                </svg>
                <span>@vpnbuysell_bot</span>
            </div>
        </div>
    </div>

    <script>
        // Инструкция по созданию скриншота
        console.log('Для создания логотипа:');

        console.log('5. Сохраните изображение');
    </script>
</body>
</html>
